server:
  port: 8080

spring:
  application:
    name: api-gateway

  # Redis / Dragonfly for rate limiting
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 2000ms

  cloud:
    gateway:
      # CORS is handled by CorsConfig.java bean

      # Routes defined programmatically in GatewayConfig.java
      # but YAML overrides can be added here if needed.

# Resilience4j circuit breaker configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        sliding-window-type: COUNT_BASED
    instances:
      productServiceCB:
        base-config: default
      authServiceCB:
        base-config: default
      orderServiceCB:
        base-config: default
      notificationServiceCB:
        base-config: default

  timelimiter:
    configs:
      default:
        timeout-duration: 5s

# Logging
logging:
  level:
    root: INFO
    com.techmarket.apigateway: DEBUG
    org.springframework.cloud.gateway: INFO
    io.github.resilience4j: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Actuator endpoints (health checks, metrics)
management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway, metrics
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
