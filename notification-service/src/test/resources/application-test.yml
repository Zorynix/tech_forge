server:
  port: 0

spring:
  application:
    name: notification-service-test

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: notification_service
    open-in-view: false

  flyway:
    enabled: true
    schemas: notification_service
    default-schema: notification_service

  mail:
    host: localhost
    port: 3025
    username: test
    password: test

  kafka:
    consumer:
      group-id: notification-service-test
      auto-offset-reset: earliest

app:
  jwt:
    secret: test-secret-key-must-be-at-least-32-characters-long-for-hmac-sha256
  telegram:
    bot-token: test-bot-token
    bot-username: test_bot
  auth-service:
    url: http://localhost:18082

logging:
  level:
    com.techmarket.notificationservice: WARN
    org.testcontainers: INFO
