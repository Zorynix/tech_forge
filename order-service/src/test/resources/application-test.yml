server:
  port: 0

spring:
  application:
    name: order-service-test

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: order_service
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    schemas: order_service
    default-schema: order_service
    locations: classpath:db/migration

app:
  jwt:
    secret: test-secret-key-must-be-at-least-32-characters-long-for-hmac-sha256
  cart:
    ttl-days: 1

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.techmarket.orderservice: WARN
    org.testcontainers: INFO
