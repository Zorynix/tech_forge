server:
  port: 0

spring:
  application:
    name: auth-service-test

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: auth_service
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    schemas: auth_service
    locations: classpath:db/migration

  mail:
    host: localhost
    port: 3025
    username: test
    password: test

app:
  jwt:
    secret: test-secret-key-must-be-at-least-32-characters-long-for-hmac-sha256
    access-token-expiration: 3600000
    refresh-token-expiration: 2592000000

logging:
  level:
    com.techmarket.authservice: WARN
    org.testcontainers: INFO
