services:
    # Infrastructure

    postgres:
        image: postgres:17-alpine
        container_name: tm-postgres
        environment:
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        ports:
            - "5433:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./infrastructure/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    dragonfly:
        image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
        container_name: tm-dragonfly
        command: ["--appendonly"]
        ports:
            - "6379:6379"
        volumes:
            - dragonfly_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    redpanda:
        image: docker.redpanda.com/redpandadata/redpanda:latest
        container_name: tm-redpanda
        command:
            - redpanda start
            - --smp 1
            - --memory 512M
            - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
            - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
        ports:
            - "19092:19092"
        volumes:
            - redpanda_data:/var/lib/redpanda/data
        healthcheck:
            test: ["CMD", "rpk", "cluster", "health"]
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    # Java Microservices

    auth-service:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                SERVICE_NAME: auth-service
        container_name: tm-auth-service
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            DB_NAME: ${DB_NAME}
            DB_USERNAME: ${DB_USERNAME}
            DB_PASSWORD: ${DB_PASSWORD}
            REDIS_HOST: dragonfly
            REDIS_PORT: 6379
            JWT_SECRET: ${JWT_SECRET}
            MAIL_USERNAME: ${MAIL_USERNAME}
            MAIL_PASSWORD: ${MAIL_PASSWORD}
        depends_on:
            postgres:
                condition: service_healthy
            dragonfly:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -qO- http://localhost:8082/actuator/health || exit 1",
                ]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 30s
        restart: unless-stopped

    product-service:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                SERVICE_NAME: product-service
        container_name: tm-product-service
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            DB_NAME: ${DB_NAME}
            DB_USERNAME: ${DB_USERNAME}
            DB_PASSWORD: ${DB_PASSWORD}
            REDIS_HOST: dragonfly
            REDIS_PORT: 6379
        depends_on:
            postgres:
                condition: service_healthy
            dragonfly:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -qO- http://localhost:8081/actuator/health || exit 1",
                ]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 30s
        restart: unless-stopped

    order-service:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                SERVICE_NAME: order-service
        container_name: tm-order-service
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            DB_NAME: ${DB_NAME}
            DB_USERNAME: ${DB_USERNAME}
            DB_PASSWORD: ${DB_PASSWORD}
            REDIS_HOST: dragonfly
            REDIS_PORT: 6379
            KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
            JWT_SECRET: ${JWT_SECRET}
        depends_on:
            postgres:
                condition: service_healthy
            dragonfly:
                condition: service_healthy
            redpanda:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -qO- http://localhost:8083/actuator/health || exit 1",
                ]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 30s
        restart: unless-stopped

    notification-service:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                SERVICE_NAME: notification-service
        container_name: tm-notification-service
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            DB_NAME: ${DB_NAME}
            DB_USERNAME: ${DB_USERNAME}
            DB_PASSWORD: ${DB_PASSWORD}
            REDIS_HOST: dragonfly
            REDIS_PORT: 6379
            KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
            JWT_SECRET: ${JWT_SECRET}
            TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
            TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
            MAIL_USERNAME: ${MAIL_USERNAME}
            MAIL_PASSWORD: ${MAIL_PASSWORD}
            AUTH_SERVICE_URL: http://auth-service:8082
        depends_on:
            postgres:
                condition: service_healthy
            dragonfly:
                condition: service_healthy
            redpanda:
                condition: service_healthy
            auth-service:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -qO- http://localhost:8084/actuator/health || exit 1",
                ]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 30s
        restart: unless-stopped

    api-gateway:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                SERVICE_NAME: api-gateway
        container_name: tm-api-gateway
        environment:
            REDIS_HOST: dragonfly
            REDIS_PORT: 6379
            FRONTEND_ORIGIN: http://localhost
            PRODUCT_SERVICE_URL: http://product-service:8081
            AUTH_SERVICE_URL: http://auth-service:8082
            ORDER_SERVICE_URL: http://order-service:8083
            NOTIFICATION_SERVICE_URL: http://notification-service:8084
        depends_on:
            dragonfly:
                condition: service_healthy
            auth-service:
                condition: service_healthy
            product-service:
                condition: service_healthy
            order-service:
                condition: service_healthy
            notification-service:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -qO- http://localhost:8080/actuator/health || exit 1",
                ]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 30s
        restart: unless-stopped

    # Frontend

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        container_name: tm-frontend
        environment:
            NEXT_PUBLIC_API_URL: /api
        depends_on:
            api-gateway:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
            interval: 15s
            timeout: 5s
            retries: 3
            start_period: 10s
        restart: unless-stopped

    # Reverse Proxy

    nginx:
        image: nginx:alpine
        container_name: tm-nginx
        ports:
            - "80:80"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            frontend:
                condition: service_healthy
            api-gateway:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -qO- http://localhost/actuator/health || exit 1",
                ]
            interval: 15s
            timeout: 5s
            retries: 3
        restart: unless-stopped

volumes:
    postgres_data:
    dragonfly_data:
    redpanda_data:
